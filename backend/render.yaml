services:
  - type: web
    name: attest-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ATTEST_SIGNING_KEY_PEM
        sync: false
      - key: ATTEST_GROQ_API_KEY
        sync: false
      - key: ATTEST_GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ATTEST_OPENAI_API_KEY
        sync: false
      - key: ATTEST_ALLOWED_ORIGINS
        sync: false
      - key: ATTEST_AUTO_INGEST_ON_STARTUP
        value: "false"
      - key: ATTEST_HOSTED_PREVIEW_MODE
        value: "true"
      - key: ATTEST_ALLOW_MUTATING_OPERATIONS
        value: "false"
      - key: ATTEST_CHROMA_PATH
        value: /tmp/chroma
      - key: ATTEST_MANIFEST_DB_PATH
        value: /tmp/attest.db
